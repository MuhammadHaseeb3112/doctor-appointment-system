{% load static %}
<!-- Google Fonts and Font Awesome -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
    }

    /* === TOPBAR === */
    .topbar {
        background-color: #f8f9fa;
        border-bottom: 1px solid #eaeaea;
        padding: 0.5rem 0;
        font-size: 0.9rem;
    }

    .topbar .icon-text {
        display: flex;
        align-items: center;
        margin-right: 1.5rem;
        color: #555;
    }

    .topbar .icon-text i {
        color: #00bcd4;
        margin-right: 0.5rem;
    }

    .topbar .social-icons a {
        margin-left: 0.5rem;
        color: #00bcd4;
        font-size: 1rem;
        transition: color 0.3s;
    }

    .topbar .social-icons a:hover {
        color: #008ba7;
    }

    /* === NAVBAR === */
    .navbar {
        background-color: #ffffff;
        padding: 1rem 0;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    .navbar-brand h2 {
        font-size: 1.6rem;
        font-weight: 700;
        color: #2c3e50;
        margin: 0;
    }

    .nav-link {
        font-weight: 500;
        color: #555 !important;
        padding: 0.75rem 1.25rem !important;
    }

    .nav-link:hover,
    .nav-link.active {
        color: #00bcd4 !important;
    }

    .dropdown-menu {
        border: none;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
        border-radius: 0.3rem;
    }

    .dropdown-item {
        padding: 0.7rem 1.5rem;
        color: #555;
    }

    .dropdown-item:hover {
        background-color: #00bcd4;
        color: #fff !important;
    }

    .btn-primary {
        background-color: #00bcd4;
        border: none;
        font-weight: 600;
        padding: 0.6rem 1.5rem;
        border-radius: 2rem;
        transition: 0.3s;
    }

    .btn-primary:hover {
        background-color: #008ba7;
    }

    @media (max-width: 991.98px) {
        .topbar .d-lg-flex {
            display: none !important;
        }

        .navbar .btn-primary {
            margin-top: 1rem;
            width: 100%;
        }
    }
</style>

<!-- === TOPBAR === -->
<div class="container-fluid topbar">
    <div class="row align-items-center px-4">
        <div class="col-lg-8 d-lg-flex align-items-center">
            {% for i in page %}
            <div class="icon-text me-4"><i class="fas fa-map-marker-alt"></i><small>{{ i.address }}</small></div>
            <div class="icon-text me-4"><i class="fas fa-envelope"></i><small>{{ i.email }}</small></div>
            <div class="icon-text"><i class="fas fa-phone-alt"></i><small>{{ i.mobilenumber }}</small></div>
            {% endfor %}
        </div>
        <div class="col-lg-4 text-end social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</div>

<!-- === NAVBAR === -->
<nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
        <a href="{% url 'index' %}" class="navbar-brand">
            <h2>RYK Hospital</h2>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a href="{% url 'index' %}" class="nav-link active">Home</a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'login' %}" class="nav-link">Admin</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="doctorDropdown" role="button" data-bs-toggle="dropdown">Doctor</a>
                    <ul class="dropdown-menu" aria-labelledby="doctorDropdown">
                        <li><a class="dropdown-item" href="{% url 'docsignup' %}">Doctor Registration</a></li>
                        <li><a class="dropdown-item" href="{% url 'login' %}">Doctor Login</a></li>
                        <li><a class="dropdown-item" href="{% url 'doctor_list' %}">View Doctors</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a href="{% url 'user_search_appointment' %}" class="nav-link">Search Appointment</a>
                </li>
            </ul>
            <div class="ms-lg-3 d-none d-lg-block">
                <a href="{% url 'appointment' %}" class="btn btn-primary">Book Appointment <i class="fas fa-arrow-right ms-2"></i></a>
            </div>
        </div>
    </div>
</nav>
