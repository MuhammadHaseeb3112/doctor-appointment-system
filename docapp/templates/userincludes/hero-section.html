{% load static %}

<!-- Hero Section Start -->
<div class="container-fluid position-relative p-0 mb-5">

    <!-- Blurred Background Image -->
    <div class="hero-background">
        <img src="{% static 'img/hero-section.png' %}" alt="Doctor Background" class="w-100 h-100">
    </div>

    <!-- Dark Overlay with Content -->
    <div class="hero-overlay d-flex align-items-center justify-content-center text-center">
        <div class="container py-5">
            <h1 class="text-white mb-4 wow fadeInDown" data-wow-delay="0.2s">
                Find and Book Your Doctor Appointment
            </h1>
            <p class="text-white-50 mb-4 wow fadeInUp" data-wow-delay="0.4s">
                Trusted healthcare services at your fingertips. Search and book appointments with ease!
            </p>

            <!-- Search Form -->
            <form method="get" action="{% url 'doctor_list' %}" class="wow fadeInUp" data-wow-delay="0.6s">
                <div class="input-group justify-content-center">
                    <input type="text" class="form-control form-control-lg w-50" name="search" placeholder="Search Doctor, Specialty, or Department..." required>
                    <button type="submit" class="btn btn-light btn-lg px-4">
                        <i class="fa fa-search text-primary"></i> Search
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>
<!-- Hero Section End -->

<!-- Hero Section Styles -->
<style>
    .hero-background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 1;
    }

    .hero-background img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: blur(8px);
        transform: scale(1.1); /* Zoom slightly to hide edges */
    }

    .hero-overlay {
        position: relative;
        z-index: 2;
        min-height: 500px;
        background: rgba(0, 0, 0, 0.5); /* Dark overlay for better text visibility */
        padding: 100px 0;
    }

    .form-control::placeholder {
        color: rgba(0, 0, 0, 0.6);
    }

    @media (max-width: 768px) {
        .hero-overlay .form-control {
            width: 100% !important;
        }
    }
</style>
