<form action="" method="POST" enctype="multipart/form-data">
    {% if messages %}
    {% for message in messages %}
        {% if message.tags == 'error' %}
        <div class="alert alert-warning alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>
        {% endif %}
    {% endfor %}
    {% endif %}

    {% csrf_token %}
    <div class="form-group">
        <label>Profile Pic</label>
        <input id="pic" type="file" class="form-control" name="pic" required="true">
    </div>

    <div class="form-group">
        <label>First Name</label>
        <input id="first_name" type="text" class="form-control" placeholder="First Name" name="first_name" required="true">
    </div>

    <div class="form-group">
        <label>Last Name</label>
        <input id="last_name" type="text" class="form-control" placeholder="Last Name" name="last_name" required="true">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input id="email" type="email" class="form-control" placeholder="Email" name="email" required="true">
    </div>

    <div class="form-group">
        <label>Username</label>
        <input id="username" type="text" class="form-control" placeholder="Enter Username" name="username" required="true">
    </div>

    <div class="form-group">
        <label>Mobile Number</label>
        <input id="mobno" type="text" class="form-control" placeholder="Mobile" name="mobno" maxlength="10" pattern="[0-9]+" required="true">
    </div>

    <div class="form-group">
        <label>Specialization</label>
        <select name="specialization_id" id="specialization_id" class="form-control" required="true">
            <option value="">Choose Specialization</option>
            {% for i in specialization %}
                <option value="{{ i.id }}">{{ i.sname }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label>Consultation</label>
        <textarea id="consultation" class="form-control" name="consultation" required="true"></textarea>
    </div>

    <div class="form-group">
        <label>Experience (Years)</label>
        <input id="experience" type="number" class="form-control" name="experience" required="true">
    </div>

    <div class="form-group">
        <label>Location</label>
        <input id="location" type="text" class="form-control" name="location" required="true">
    </div>

    <div class="form-group">
        <label>Rating</label>
        <input id="rating" type="number" step="0.1" min="0" max="5" class="form-control" name="rating" required="true">
    </div>

    <div class="form-group">
        <button class="btn btn-primary btn-block" type="submit">Register</button>
    </div>
</form>
