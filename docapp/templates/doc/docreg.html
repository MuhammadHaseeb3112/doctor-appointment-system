<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <title>Doctor Registration</title>

    <!-- Fonts and Styles -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
    <link rel="stylesheet" href="{% static 'assets/plugins/bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7fc;
        }

        .registerbox {
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 900px;
            margin: 80px auto;
        }

        .registerbox h2 {
            font-weight: 600;
            color: #007bff;
            margin-bottom: 10px;
        }

        .form-control {
            border-radius: 8px;
            background: #f8f9fa;
        }

        .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        .btn-primary {
            padding: 12px;
            font-weight: 500;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }

        .dont-have {
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

   
    <div class="registerbox">
        <h2 class="text-center">Doctor Registration</h2>
        <p class="text-center text-muted mb-4">Create your account to access the portal</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
            {% endfor %}
        {% endif %}

        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- First Name + Last Name -->
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>First Name</label>
                    <input type="text" class="form-control" name="first_name" placeholder="Enter first name" required>
                </div>
                <div class="form-group col-md-6">
                    <label>Last Name</label>
                    <input type="text" class="form-control" name="last_name" placeholder="Enter last name" required>
                </div>
            </div>

            <!-- Email + Mobile -->
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>Email</label>
                    <input type="email" class="form-control" name="email" placeholder="Enter email address" required>
                </div>
                <div class="form-group col-md-6">
                    <label>Mobile Number</label>
                    <input type="text" class="form-control" name="mobno" placeholder="10-digit mobile number" maxlength="10" pattern="[0-9]+" required>
                </div>
            </div>

            <!-- Username + Password -->
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>Username</label>
                    <input type="text" class="form-control" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group col-md-6">
                    <label>Password</label>
                    <input type="password" class="form-control" name="password" placeholder="Create a password" required>
                </div>
            </div>

            <!-- Specialization + Profile Pic -->
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>Specialization</label>
                    <select class="form-control" name="specialization_id" required>
                        <option value="">Select Specialization</option>
                        {% for i in specialization %}
                            <option value="{{ i.id }}">{{ i.sname }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group col-md-6">
                    <label>Profile Picture</label>
                    <input type="file" class="form-control" name="pic" required>
                </div>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </div>
        </form>

        <div class="dont-have">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </div>
    </div>

   

    <script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>
    <script src="{% static 'assets/js/popper.min.js' %}"></script>
    <script src="{% static 'assets/plugins/bootstrap/js/bootstrap.min.js' %}"></script>
    <script src="{% static 'assets/js/script.js' %}"></script>

</body>
</html>
