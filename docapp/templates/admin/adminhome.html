{% extends 'base.html' %}
{% block content %}

<div class="container-fluid py-4">
    <!-- Page Header -->
    <div class="row mb-4">
        <div class="col">
            <h3 class="fw-semibold">Welcome {{ user.first_name }} {{ user.last_name }}!</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item active" aria-current="page">Dashboard</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- Dashboard Widgets -->
    <div class="row g-4">
        <!-- Doctor Count -->
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div class="rounded-circle bg-light p-3">
                        <i class="fas fa-user-md fa-2x text-primary"></i>
                    </div>
                    <div class="text-end">
                        <h3 class="mb-0 text-dark">{{ doctor_count }}</h3>
                        <a href="{% url 'viewdoctorlist' %}" class="text-muted small text-decoration-none">Total Doctors</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Specialization Count -->
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div class="rounded-circle bg-light p-3">
                        <i class="fas fa-stethoscope fa-2x text-success"></i>
                    </div>
                    <div class="text-end">
                        <h3 class="mb-0 text-dark">{{ specialization_count }}</h3>
                        <a href="{% url 'manage_specilizations' %}" class="text-muted small text-decoration-none">Total Specializations</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
