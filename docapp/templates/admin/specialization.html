{% extends 'base.html' %}
{% block content %}

<div class="container-fluid py-4">

    <!-- Page Header -->
    <div class="row mb-4">
        <div class="col">
            <h3 class="fw-semibold">Add Specialization</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="{% url 'admin_home' %}">Dashboard</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Add Specialization</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- Alert Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    <!-- Add Specialization Form -->
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="card-title mb-0">Add Specialization</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{% url 'add_specilizations' %}" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3 row">
                            <label class="col-sm-4 col-form-label">Specialization Name</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control" name="specializationname" required>
                            </div>
                        </div>

                        <div class="text-end">
                            <button type="submit" class="btn btn-primary">Add</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

{% endblock %}
