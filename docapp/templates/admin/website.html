{% extends 'base.html' %}
{% block content %}

<div class="container-fluid py-4">

    <!-- Page Header -->
    <div class="row mb-4">
        <div class="col">
            <h3 class="fw-semibold">Update Website Details</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="{% url 'admin_home' %}">Dashboard</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Update Website Details</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- Alert Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    <!-- Update Website Details Form -->
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="card-title mb-0">Update Website Details</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{% url 'update_website_details' %}">
                        {% csrf_token %}
                        {% for i in page %}
                        
                        <input type="hidden" name="web_id" value="{{i.id}}">

                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">Page Title</label>
                            <div class="col-sm-10">
                                <input type="text" class="form-control" name="pagetitle" value="{{i.pagetitle}}" required>
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">Address</label>
                            <div class="col-sm-10">
                                <textarea class="form-control" name="address" required>{{i.address}}</textarea>
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">About Us</label>
                            <div class="col-sm-10">
                                <textarea class="form-control" name="aboutus" required>{{i.aboutus}}</textarea>
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">Email</label>
                            <div class="col-sm-10">
                                <input type="email" class="form-control" name="email" value="{{i.email}}" required>
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">Mobile Number</label>
                            <div class="col-sm-10">
                                <input type="text" class="form-control" name="mobilenumber" value="{{i.mobilenumber}}" required>
                            </div>
                        </div>
                        {% endfor %}
                        
                        <div class="text-end">
                            <button type="submit" class="btn btn-primary">Update</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

{% endblock %}
